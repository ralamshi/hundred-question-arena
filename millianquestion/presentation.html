<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<title>百問擂台 · 簡報版</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=JetBrains+Mono:wght@400;500;600&family=Noto+Serif+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --navy-950: #04081a; --navy-900: #070d24; --navy-800: #0a1535;
  --navy-700: #122050; --navy-600: #1a2d6e;
  --gold-500: #d4a534; --gold-400: #e7c057; --gold-300: #f5d97a; --gold-200: #fce9a3;
  --copper: #b8732a; --crimson: #c83232; --emerald: #2fa86b;
  --ink: #f7eccd; --ink-dim: #c9b890;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: #000; }
section {
  font-family: 'Noto Serif TC', 'Cormorant Garamond', Georgia, serif;
  color: var(--ink);
  background:
    radial-gradient(ellipse 80% 55% at 50% 35%, rgba(40, 67, 160, 0.4), transparent 65%),
    radial-gradient(ellipse 70% 45% at 50% 110%, rgba(212, 165, 52, 0.15), transparent 65%),
    var(--navy-950);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  padding: 80px 120px;
  position: relative;
}
/* Light beams, decorative */
section::before {
  content: '';
  position: absolute;
  top: -5%; left: 5%; right: 5%;
  height: 70%;
  background:
    linear-gradient(100deg, transparent 48%, rgba(245,217,122,0.08) 50%, transparent 52%),
    linear-gradient(80deg, transparent 48%, rgba(245,217,122,0.08) 50%, transparent 52%);
  filter: blur(30px);
  pointer-events: none;
}
/* Arena floor arcs */
section::after {
  content: '';
  position: absolute;
  bottom: -400px; left: 50%;
  width: 2800px; height: 900px;
  transform: translateX(-50%);
  border-radius: 50%;
  border-top: 1px solid rgba(212,165,52,0.2);
  background: radial-gradient(ellipse at center top, rgba(212,165,52,0.08), transparent 50%);
  pointer-events: none;
}

/* Brand block */
.brand-top {
  display: flex; align-items: center; gap: 22px;
  position: relative; z-index: 2;
}
.brand-orb {
  width: 64px; height: 64px; border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, var(--gold-200), var(--gold-500) 60%, var(--copper));
  box-shadow: 0 0 40px rgba(212,165,52,0.55), inset 0 -6px 12px rgba(0,0,0,0.3), inset 0 6px 12px rgba(255,255,255,0.3);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Cormorant Garamond', serif; font-weight: 700; font-size: 42px;
  color: var(--navy-900);
}
.brand-top .tx-title {
  font-family: 'Noto Serif TC', serif; font-size: 28px; font-weight: 600;
  letter-spacing: 0.25em; color: var(--gold-300);
}
.brand-top .tx-sub {
  font-family: 'JetBrains Mono', monospace; font-size: 12px;
  letter-spacing: 0.4em; color: var(--ink-dim); text-transform: uppercase;
  margin-top: 6px;
}

/* TITLE SLIDE */
.slide-title {
  align-items: center; justify-content: center; text-align: center;
  padding: 0;
}
.slide-title .big-orb {
  width: 260px; height: 260px; border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, var(--gold-200), var(--gold-500) 60%, var(--copper));
  box-shadow: 0 0 120px rgba(212,165,52,0.7), inset 0 -20px 40px rgba(0,0,0,0.3), inset 0 20px 40px rgba(255,255,255,0.3);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Cormorant Garamond', serif; font-weight: 700; font-size: 180px;
  color: var(--navy-900);
  margin-bottom: 60px;
  position: relative; z-index: 2;
}
.slide-title h1 {
  font-family: 'Noto Serif TC', serif; font-weight: 700;
  font-size: 140px; letter-spacing: 0.3em; color: var(--gold-300);
  text-shadow: 0 0 80px rgba(212,165,52,0.5);
  position: relative; z-index: 2;
  margin-right: -0.3em; /* compensate letter-spacing */
}
.slide-title .kicker {
  font-family: 'JetBrains Mono', monospace; font-size: 20px;
  letter-spacing: 0.6em; color: var(--ink-dim); text-transform: uppercase;
  margin-top: 16px;
  position: relative; z-index: 2;
}
.slide-title .rule {
  margin-top: 80px; display: flex; align-items: center; gap: 24px;
  position: relative; z-index: 2;
}
.slide-title .rule .line {
  width: 160px; height: 1px; background: var(--gold-400);
}
.slide-title .rule .diamond {
  width: 14px; height: 14px; transform: rotate(45deg);
  background: var(--gold-400);
}

/* SECTION INTRO slide */
.slide-intro {
  justify-content: space-between;
}
.intro-body {
  display: grid; grid-template-columns: 1fr 1fr; gap: 80px;
  align-items: center; flex: 1;
  position: relative; z-index: 2;
}
.intro-body h2 {
  font-family: 'Noto Serif TC', serif; font-size: 96px; font-weight: 600;
  letter-spacing: 0.1em; color: var(--gold-300); line-height: 1.1;
}
.intro-body p {
  font-family: 'Cormorant Garamond', serif; font-size: 32px; line-height: 1.6;
  color: var(--ink); font-style: italic;
}
.rules-list {
  list-style: none;
  font-family: 'Noto Serif TC', serif;
  font-size: 30px;
  color: var(--ink);
  line-height: 1.8;
}
.rules-list li {
  padding-left: 48px; position: relative;
  margin-bottom: 16px;
}
.rules-list li::before {
  content: ''; position: absolute; left: 0; top: 18px;
  width: 10px; height: 10px; transform: rotate(45deg);
  background: var(--gold-400);
}
.rules-list li strong { color: var(--gold-300); font-weight: 600; }

/* QUESTION SLIDE */
.slide-q {
  padding: 100px 150px;
  justify-content: center;
}
.q-header {
  display: flex; justify-content: space-between; align-items: center;
  font-family: 'JetBrains Mono', monospace; font-size: 18px;
  letter-spacing: 0.3em; text-transform: uppercase;
  color: var(--ink-dim);
  padding-bottom: 30px;
  border-bottom: 1px solid rgba(212,165,52,0.25);
  margin-bottom: 60px;
  position: relative; z-index: 2;
}
.q-header .q-num { color: var(--gold-300); font-weight: 600; }
.q-header .q-pts { color: var(--gold-400); font-weight: 600; }
.q-stage {
  position: relative; z-index: 2;
  padding: 60px 80px;
  background: linear-gradient(180deg, var(--navy-700), var(--navy-800));
  border: 3px solid var(--gold-500);
  clip-path: polygon(36px 0, calc(100% - 36px) 0, 100% 36px, 100% calc(100% - 36px), calc(100% - 36px) 100%, 36px 100%, 0 calc(100% - 36px), 0 36px);
  min-height: 220px;
  display: flex; align-items: center; justify-content: center;
  text-align: center;
  box-shadow: 0 0 100px rgba(40,67,160,0.5), inset 0 0 60px rgba(0,0,0,0.4);
  margin-bottom: 60px;
}
.q-stage .q-text {
  font-family: 'Noto Serif TC', serif;
  font-size: 56px; font-weight: 500; line-height: 1.4;
  color: var(--ink);
  text-wrap: balance;
}
.q-answers {
  display: grid; grid-template-columns: 1fr 1fr; gap: 24px 36px;
  position: relative; z-index: 2;
}
.q-ans {
  display: flex; align-items: center; gap: 24px;
  padding: 28px 40px;
  background: linear-gradient(180deg, var(--navy-700), var(--navy-800));
  border: 2px solid var(--gold-500);
  clip-path: polygon(22px 0, 100% 0, calc(100% - 22px) 100%, 0 100%);
  min-height: 100px;
  font-family: 'Noto Serif TC', serif;
  font-size: 34px;
  color: var(--ink);
}
.q-ans.highlight {
  background: linear-gradient(180deg, #1d6b46, #0d4a2d);
  border-color: var(--emerald);
  box-shadow: 0 0 50px rgba(47,168,107,0.5);
}
.q-ans .letter {
  font-family: 'Cormorant Garamond', serif; font-style: italic;
  font-size: 46px; font-weight: 600; color: var(--gold-300);
  flex-shrink: 0; width: 50px; text-align: center;
}

/* REVEAL SLIDE */
.slide-reveal {
  align-items: center; justify-content: center; text-align: center;
}
.reveal-label {
  font-family: 'JetBrains Mono', monospace; font-size: 18px;
  letter-spacing: 0.6em; color: var(--ink-dim);
  text-transform: uppercase; margin-bottom: 24px;
  position: relative; z-index: 2;
}
.reveal-letter {
  font-family: 'Cormorant Garamond', serif; font-style: italic;
  font-size: 340px; font-weight: 700;
  color: var(--gold-300);
  text-shadow: 0 0 120px rgba(212,165,52,0.7);
  line-height: 1;
  position: relative; z-index: 2;
  margin-bottom: 20px;
}
.reveal-answer {
  font-family: 'Noto Serif TC', serif;
  font-size: 64px; color: var(--ink); font-weight: 500;
  margin-top: 16px;
  position: relative; z-index: 2;
  text-wrap: balance;
  max-width: 1400px;
}
.reveal-pts {
  font-family: 'JetBrains Mono', monospace; font-size: 24px;
  letter-spacing: 0.3em; color: var(--gold-400);
  text-transform: uppercase;
  margin-top: 40px;
  position: relative; z-index: 2;
}

/* FINAL SLIDE */
.slide-final {
  align-items: center; justify-content: center; text-align: center;
}
.slide-final .final-kicker {
  font-family: 'JetBrains Mono', monospace; font-size: 22px;
  letter-spacing: 0.8em; color: var(--ink-dim);
  text-transform: uppercase; margin-bottom: 30px;
  position: relative; z-index: 2;
}
.slide-final .final-num {
  font-family: 'Cormorant Garamond', serif; font-weight: 700;
  font-size: 280px; color: var(--gold-300);
  text-shadow: 0 0 100px rgba(212,165,52,0.6);
  line-height: 1;
  position: relative; z-index: 2;
}
.slide-final .final-units {
  font-family: 'JetBrains Mono', monospace; font-size: 20px;
  letter-spacing: 0.4em; color: var(--gold-400);
  text-transform: uppercase;
  margin-top: 10px;
  position: relative; z-index: 2;
}
.slide-final .final-msg {
  font-family: 'Cormorant Garamond', serif; font-style: italic;
  font-size: 40px; color: var(--ink);
  margin-top: 60px;
  position: relative; z-index: 2;
  max-width: 1200px;
  line-height: 1.5;
}
.slide-final .thanks {
  font-family: 'Noto Serif TC', serif; font-size: 80px;
  color: var(--gold-300); letter-spacing: 0.3em;
  margin-top: 80px; font-weight: 600;
  position: relative; z-index: 2;
}

/* slide number footer */
.slide-footer {
  position: absolute;
  bottom: 48px; left: 120px; right: 120px;
  display: flex; justify-content: space-between;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px; letter-spacing: 0.3em;
  color: var(--ink-dim); text-transform: uppercase;
  z-index: 2;
}
</style>
</head>
<body>
<deck-stage width="1920" height="1080">

  <!-- 01 TITLE -->
  <section class="slide-title" data-label="Title">
    <div class="big-orb">Q</div>
    <h1>百問擂台</h1>
    <div class="kicker">The Hundred-Question Arena</div>
    <div class="rule">
      <span class="line"></span>
      <span class="diamond"></span>
      <span class="line"></span>
    </div>
  </section>

  <!-- 02 RULES -->
  <section class="slide-intro" data-label="Rules">
    <div class="brand-top">
      <div class="brand-orb">Q</div>
      <div>
        <div class="tx-title">規 則</div>
        <div class="tx-sub">How to Play</div>
      </div>
    </div>
    <div class="intro-body">
      <div>
        <h2>十 題<br/>四 擇 一</h2>
        <p style="margin-top: 24px;">每題答對，分數翻倍累積。答錯不扣分，可繼續挑戰。</p>
      </div>
      <ul class="rules-list">
        <li><strong>三條求助：</strong>對半消除、現場投票、打電話問朋友</li>
        <li><strong>每人只能使用一次</strong>任一求助</li>
        <li><strong>答錯繼續：</strong>本題不加分，下題繼續</li>
        <li><strong>滿分：</strong>10,230 分</li>
      </ul>
    </div>
    <div class="slide-footer">
      <span>百問擂台</span>
      <span>02 / 23</span>
    </div>
  </section>

  <!-- Questions injected here by script -->
  <div id="slots"></div>

  <!-- Final thanks slide injected at end too -->
</deck-stage>

<script type="application/json" id="speaker-notes">
[
  "歡迎來到百問擂台。今次我們有十條問題，每條四個選項。",
  "遊戲規則很簡單：答對加分，答錯不扣分繼續挑戰。每人有三條求助機會——對半消除、現場投票、打電話問朋友，每條只能用一次。讓我們開始。"
]
</script>

<script src="questions.js"></script>
<script>
// Generate question + reveal slides from the question bank
(function() {
  const LETTERS = ['A', 'B', 'C', 'D'];
  const qs = window.DEFAULT_QUESTIONS;
  const slots = document.getElementById('slots');
  const deckStage = document.querySelector('deck-stage');
  const notesTag = document.getElementById('speaker-notes');
  const notes = JSON.parse(notesTag.textContent);

  let slideNum = 2; // after title + rules
  const total = 2 + qs.length * 2 + 1; // title + rules + (Q + A) * n + final

  qs.forEach((q, i) => {
    slideNum++;
    // Question slide
    const qSlide = document.createElement('section');
    qSlide.className = 'slide-q';
    qSlide.setAttribute('data-label', `Q${i+1}`);
    qSlide.innerHTML = `
      <div class="q-header">
        <span class="q-num">QUESTION ${String(i+1).padStart(2, '0')} / ${String(qs.length).padStart(2, '0')}</span>
        <span class="q-pts">${q.points.toLocaleString()} pts</span>
      </div>
      <div class="q-stage">
        <div class="q-text">${escapeHtml(q.question)}</div>
      </div>
      <div class="q-answers">
        ${q.choices.map((c, j) => `
          <div class="q-ans">
            <div class="letter">${LETTERS[j]}</div>
            <div>${escapeHtml(c)}</div>
          </div>
        `).join('')}
      </div>
      <div class="slide-footer">
        <span>百問擂台 · Q${i+1}</span>
        <span>${String(slideNum).padStart(2, '0')} / ${String(total).padStart(2, '0')}</span>
      </div>
    `;
    deckStage.insertBefore(qSlide, slots);
    notes.push(`第 ${i+1} 題，值 ${q.points} 分。題目是：${q.question}。四個選項在畫面上，給大家三十秒思考。`);

    slideNum++;
    // Reveal slide
    const rSlide = document.createElement('section');
    rSlide.className = 'slide-reveal';
    rSlide.setAttribute('data-label', `A${i+1}`);
    rSlide.innerHTML = `
      <div class="reveal-label">◆ Correct Answer ◆</div>
      <div class="reveal-letter">${LETTERS[q.correct]}</div>
      <div class="reveal-answer">${escapeHtml(q.choices[q.correct])}</div>
      <div class="reveal-pts">+ ${q.points.toLocaleString()} pts</div>
      <div class="slide-footer">
        <span>百問擂台 · 解答 ${i+1}</span>
        <span>${String(slideNum).padStart(2, '0')} / ${String(total).padStart(2, '0')}</span>
      </div>
    `;
    deckStage.insertBefore(rSlide, slots);
    notes.push(`正確答案是 ${LETTERS[q.correct]}：${q.choices[q.correct]}。答對的朋友，分數 + ${q.points}。`);
  });

  // Final slide
  slideNum++;
  const maxScore = qs.reduce((a, b) => a + b.points, 0);
  const final = document.createElement('section');
  final.className = 'slide-final';
  final.setAttribute('data-label', 'Final');
  final.innerHTML = `
    <div class="final-kicker">◆ Maximum Score ◆</div>
    <div class="final-num">${maxScore.toLocaleString()}</div>
    <div class="final-units">滿 分 成 績</div>
    <div class="final-msg">
      今晚的挑戰到此結束。<br/>
      <span style="color: var(--gold-400);">感謝每一位參與者。</span>
    </div>
    <div class="thanks">謝 幕</div>
    <div class="slide-footer">
      <span>百問擂台</span>
      <span>${String(slideNum).padStart(2, '0')} / ${String(total).padStart(2, '0')}</span>
    </div>
  `;
  deckStage.insertBefore(final, slots);
  notes.push(`這就是今次的百問擂台。無論你答對幾題，感謝你的參與。我們下次再見。`);

  slots.remove();
  notesTag.textContent = JSON.stringify(notes);

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, m => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[m]));
  }
})();
</script>
<script src="deck-stage.js"></script>
</body>
</html>
